name: Publish GoxPlayer

on:
  push:
    tags:
      - 'goxplayer-v*'

jobs:
  publish-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GoxStream
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install
        
      - name: Build GoxPlayer
        run: pnpm --filter goxplayer build

      - name: Publish to NPM
        run: pnpm --filter goxplayer publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Sync to GoxPlayer Repository
        uses: cpina/github-action-push-to-another-repository@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.API_TOKEN_GITHUB }}
        with:
          source-directory: 'packages/goxplayer'
          destination-github-username: 'goxstream' # Updated to correct user
          destination-repository-name: 'goxplayer'
          user-email: '66510723+dyzulk@users.noreply.github.com'
          user-name: 'dyzulk'
          target-branch: main
          commit-message: 'chore: sync goxplayer from goxstream monorepo'
